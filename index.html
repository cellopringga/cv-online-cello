<style>
  :root {
    --primary: #46a3a7;
    --secondary: #54dfe4;
    --accent: #ffbc00;
    --glass: rgba(255, 255, 255, 0.8);
    --text-main: #2d3436;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

  body {
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    min-height: 100vh;
    color: var(--text-main);
  }

  /* Navigasi Glassmorphism yang Melayang */
  nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
    padding: 20px;
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
  }

  nav button {
    padding: 12px 24px;
    border: none;
    border-radius: 30px;
    background: var(--glass);
    color: #636e72;
    cursor: pointer;
    transition: all 0.4s ease;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  }

  nav button:hover, nav button.active {
    background: var(--primary);
    color: white;
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(70, 163, 167, 0.3);
  }

  /* Container Utama yang Simetris */
  #content {
    max-width: 900px;
    margin: 50px auto;
    background: white;
    padding: 60px 40px;
    border-radius: 40px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.1);
    text-align: center; /* Memastikan semua teks & judul di tengah */
    position: relative;
    border: 1px solid rgba(255,255,255,0.8);
  }

  /* Judul Seksi yang Cantik */
  .section-title { 
    font-size: 2.5rem;
    font-weight: 800;
    margin-bottom: 40px;
    color: var(--primary);
    position: relative;
    display: inline-block;
  }

  .section-title::after {
    content: '';
    display: block;
    width: 60px;
    height: 5px;
    background: var(--accent);
    margin: 10px auto 0; /* Garis bawah judul juga di tengah */
    border-radius: 10px;
  }

  /* Card Grid yang Seimbang */
  .grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
    gap: 30px; 
    margin-top: 20px;
    justify-content: center;
  }

  .card { 
    padding: 30px; 
    background: #fdfdfd;
    border-radius: 25px; 
    border: 1px solid #f1f2f6;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    text-align: center;
  }

  .card:hover { 
    transform: scale(1.03);
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    border-color: var(--secondary);
  }

  /* Responsif Mobile */
  @media (max-width: 600px) {
    #content { margin: 20px; padding: 30px 20px; }
    .section-title { font-size: 1.8rem; }
    nav { gap: 8px; padding: 15px 10px; }
    nav button { padding: 10px 15px; font-size: 0.8rem; }
  }
</style>
