<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Cello Ondrea Pringga - PWA</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#46a3a7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CV Cello">
  <link rel="apple-touch-icon" href="cel.jpeg">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    :root { --primary: #46a3a7; --bg: #f4f7f6; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); }
    header { background: var(--primary); color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 1000; }
    nav { background: white; display: flex; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #ddd; }
    nav button { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: #555; }
    nav button.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
    #content { padding: 20px; max-width: 800px; margin: auto; min-height: 70vh; }
    .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    footer { text-align: center; padding: 20px; color: #777; font-size: 0.9rem; }
  </style>
</head>
<body>

<header>
  <h1>CV Digital</h1>
</header>

<nav id="mainNav">
  <button class="active" data-page="home.html">Home</button>
  <button data-page="about.html">About</button>
  <button data-page="education.html">Edu</button>
  <button data-page="experience.html">Work</button>
  <button data-page="skills.html">Skills</button>
  <button data-page="portfolio.html">Porto</button>
  <button data-page="certificate.html">Cert</button>
  <button data-page="contact.html">Contact</button>
</nav>

<div id="content">
  </div>

<footer>
  <p>&copy; 2026 Cello Ondrea Pringga - Universitas Ma'soem</p>
</footer>

<script src="app.js"></script>
<script>
  // Register Service Worker untuk mendukung PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('SW Registered!', reg))
        .catch(err => console.log('SW Failed!', err));
    });
  }
</script>
</body>
</html>
