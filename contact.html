<h2 class="section-title">Contact Me</h2>
<form id="contactForm">
  <div style="margin-bottom:15px">
    <label>Nama:</label><br>
    <input type="text" id="name" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ccc;">
    <span id="nameError" class="error" style="font-size:0.8rem"></span>
  </div>
  <div style="margin-bottom:15px">
    <label>Email:</label><br>
    <input type="text" id="email" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ccc;">
    <span id="emailError" class="error" style="font-size:0.8rem"></span>
  </div>
  <div style="margin-bottom:15px">
    <label>Pesan:</label><br>
    <textarea id="message" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ccc; height:100px;"></textarea>
  </div>
  <button type="submit" style="background:#46a3a7; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; width:100%">Kirim Pesan</button>
</form>
